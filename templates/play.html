<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connections | Play</title>
    <link rel="stylesheet", type="text/css" href="../static/styles.css">
</head>
<body>
    <div class="title">{{ title }}</div>
    <div class="author">Created by: {{ author }}</div>
    <div class="guess-counter" id="guess-counter">Incorrect Guesses: 0</div>
    <div class="container">
        <div class="grid-container" id="grid">
            {% for word in words %}
                <div class="grid-item" onclick="toggleSelection(this)">{{ word }}</div>
            {% endfor %}
        </div>
    </div>
    <div class="button-container">
        <button class="shuffle-button" id="shuffle-button" onclick="shuffleGrid()">Shuffle</button>
        <div class="button-row">
            <button id="clear-button">Clear</button>
            <button id="submit-button" disabled>Submit Guess</button>
        </div>
    </div>
    <p id="feedback"></p>

    <script>
        let words = {{ words | tojson }};
        let selectedTiles = [];
        let solvedCategories = [];
        let incorrectGuesses = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderGrid() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            solvedCategories.forEach(category => {
                const categoryDiv = document.createElement("div");
                categoryDiv.className = `category-box ${category.color}`;
                categoryDiv.textContent = category.name;
                grid.appendChild(categoryDiv);
            });

            words.forEach((word, index) => {
                if (!solvedCategories.some(cat => cat.words.includes(word))) {
                    const div = document.createElement("div");
                    div.className = "grid-item";
                    div.textContent = word;
                    div.dataset.index = index;
                    div.onclick = () => toggleSelection(div);
                    grid.appendChild(div);
                }
            });
        }

        function toggleSelection(tile) {
            const index = tile.dataset.index;
            if (selectedTiles.includes(index)) {
                selectedTiles = selectedTiles.filter(i => i !== index);
                tile.classList.remove("selected");
            } else if (selectedTiles.length < 4) {
                selectedTiles.push(index);
                tile.classList.add("selected");
            }
            document.getElementById("submit-button").disabled = selectedTiles.length !== 4;
        }

        function submitGuess() {
            if (selectedTiles.length !== 4) return;

            const selectedWords = selectedTiles.map(index => words[index]);

            fetch(window.location.pathname, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ words: selectedWords })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else if (data.correct) {
                    alert(`Correct! Category: ${data.category.name}`);
                    solvedCategories.push({ name: data.category.name, color: data.category.color, words: selectedWords });
                    words = words.filter(word => !selectedWords.includes(word));
                } else if (data.one_away) {
                    alert("You're one word away!");
                } else {
                    alert("Incorrect guess.");
                    incorrectGuesses++;
                    document.getElementById("guess-counter").textContent = `Incorrect Guesses: ${incorrectGuesses}`;
                }
                selectedTiles = [];
                renderGrid();
                document.getElementById("submit-button").disabled = true;
            })
            .catch(error => console.error("Error:", error));
        }

        function clearSelection() {
            selectedTiles = [];
            renderGrid();
            document.getElementById("submit-button").disabled = true;
        }

        document.getElementById("shuffle-button").addEventListener("click", () => {
            shuffleArray(words);
            renderGrid();
        });

        document.getElementById("submit-button").addEventListener("click", submitGuess);
        document.getElementById("clear-button").addEventListener("click", clearSelection);

        shuffleArray(words);
        renderGrid();
    </script>
</body>
</html>
