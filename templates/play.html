<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connections | Play</title>
    <link rel="stylesheet", type="text/css" href="../static/styles.css">
</head>
<body>
    <div class="container">
        <div class="title" id="puzzle-title">Puzzle Title</div>
        <div class="author" id="puzzle-author">Created by: Author</div>
        <div class="grid-container" id="grid"></div>
        <div class="button-container">
            <button id="shuffle-button">Shuffle</button>
            <button id="submit-button" disabled>Submit Guess</button>
        </div>
        <p id="feedback"></p>
    </div>
    <script>
        let words = [];
        let selectedTiles = [];
        let puzzleId = new URLSearchParams(window.location.search).get("id");

        async function fetchPuzzle() {
            let response = await fetch(`/play?id=${puzzleId}`);
            let data = await response.json();
            document.getElementById("puzzle-title").textContent = data.title;
            document.getElementById("puzzle-author").textContent = "Created by: " + data.author;
            words = data.words;
            renderGrid();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderGrid() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            words.forEach((word, index) => {
                const div = document.createElement("div");
                div.className = "grid-item";
                div.textContent = word;
                div.dataset.index = index;
                div.onclick = () => toggleSelection(div);
                grid.appendChild(div);
            });
        }

        function toggleSelection(tile) {
            const index = tile.dataset.index;
            if (selectedTiles.includes(index)) {
                selectedTiles = selectedTiles.filter(i => i !== index);
                tile.classList.remove("selected");
            } else if (selectedTiles.length < 4) {
                selectedTiles.push(index);
                tile.classList.add("selected");
            }
            document.getElementById("submit-button").disabled = selectedTiles.length !== 4;
        }

        async function submitGuess() {
            let selectedWords = selectedTiles.map(i => words[i]);
            let response = await fetch(`/play?id=${puzzleId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ words: selectedWords })
            });
            let result = await response.json();

            if (result.error) {
                alert(result.error);
            } else if (result.correct) {
                alert(`Correct! Category: ${result.category.name}`);
            } else if (result.one_away) {
                alert("You're one away from a correct answer!");
            } else {
                alert("Incorrect guess.");
            }
        }

        document.getElementById("shuffle-button").addEventListener("click", () => {
            shuffleArray(words);
            renderGrid();
        });

        fetchPuzzle();
    </script>
</body>
</html>
