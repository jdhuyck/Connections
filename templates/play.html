<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connections | Play</title>
    <link rel="stylesheet", type="text/css" href="../static/styles.css">
</head>
<body>
    <h2>Connections Puzzle</h2>
    <div id="completed-categories"></div>
    <div class="grid" id="word-grid"></div>
    <button onclick="submitGuess()">Submit Guess</button>
    <p id="message"></p>
    
    <script>
        let words = [];
        let selectedWords = [];
        let categories = {};
        let colors = ["category-yellow", "category-green", "category-blue", "category-purple"];
        let categoryIndex = 0;
        let solvedCategories = {};
        
        async function fetchPuzzle() {
            const puzzleId = window.location.pathname.split("/").pop();
            const response = await fetch(`/play/${puzzleId}`);
            const data = await response.json();
            words = data.words;
            categories = data.categories;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById("word-grid");
            grid.innerHTML = "";
            words.forEach(word => {
                const tile = document.createElement("div");
                tile.textContent = word;
                tile.classList.add("tile");
                tile.onclick = () => toggleSelection(word, tile);
                grid.appendChild(tile);
            });
        }

        function toggleSelection(word, tile) {
            if (selectedWords.includes(word)) {
                selectedWords = selectedWords.filter(w => w !== word);
                tile.classList.remove("selected");
            } else if (selectedWords.length < 4) {
                selectedWords.push(word);
                tile.classList.add("selected");
            }
        }

        async function submitGuess() {
            if (selectedWords.length !== 4) {
                document.getElementById("message").textContent = "Select exactly 4 words.";
                return;
            }

            const response = await fetch(window.location.pathname, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ guess: selectedWords })
            });
            const result = await response.json();
            document.getElementById("message").textContent = result.message;

            if (result.correct) {
                moveToCategory(selectedWords);
            }
        }

        function moveToCategory(wordsGroup) {
            const categoryContainer = document.getElementById("completed-categories");
            const row = document.createElement("div");
            row.classList.add("completed-row", colors[categoryIndex]);
            wordsGroup.forEach(word => {
                const wordDiv = document.createElement("div");
                wordDiv.classList.add("tile", colors[categoryIndex]);
                wordDiv.textContent = word;
                row.appendChild(wordDiv);
            });
            categoryContainer.appendChild(row);
            words = words.filter(word => !wordsGroup.includes(word));
            categoryIndex = (categoryIndex + 1) % colors.length;
            renderGrid();
        }

        fetchPuzzle();
    </script>
</body>
</html>
